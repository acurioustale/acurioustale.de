name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without writing (rsync --dry-run)"
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # Nu Html Checker (current release) over the markup, the stylesheet and the
      # SVG favicon, mirroring `validate.sh`. We download the jar rather than use
      # a packaged wrapper: wrappers ship an older bundled vnu that rejects valid
      # modern features (theme-color `media`, the `color-scheme` CSS property).
      # Selecting files by extension keeps vnu away from the binary PNGs.
      - name: Validate HTML, CSS and SVG
        run: |
          curl -sSL -o "$RUNNER_TEMP/vnu.jar" \
            https://github.com/validator/validator/releases/download/latest/vnu.jar
          files=$(find . \( -path ./.git -o -path ./node_modules \) -prune -o \
            \( -name '*.html' -o -name '*.css' -o -name '*.svg' \) -print)
          # $files is intentionally unquoted so each path is a separate argument.
          # shellcheck disable=SC2086
          java -jar "$RUNNER_TEMP/vnu.jar" \
            --filterpattern '.*Trailing slash on void elements.*' \
            --also-check-css --also-check-svg $files

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install npm tooling
        run: npm ci

      # Pinned to the version run locally so CI and developers agree on style.
      - name: Check formatting (Prettier)
        run: npx prettier@3.8.3 --check .

      # shellcheck is preinstalled on ubuntu-latest; shfmt we fetch as a pinned
      # static binary so CI matches what developers run locally.
      - name: Lint and format-check shell scripts
        run: |
          shellcheck deploy.sh validate.sh
          curl -sSL -o "$RUNNER_TEMP/shfmt" \
            https://github.com/mvdan/sh/releases/download/v3.13.1/shfmt_v3.13.1_linux_amd64
          chmod +x "$RUNNER_TEMP/shfmt"
          "$RUNNER_TEMP/shfmt" -d deploy.sh validate.sh

      # actionlint validates the workflow itself and runs ShellCheck over the
      # embedded run scripts. Pinned static binary, no repo dependencies.
      - name: Lint workflows (actionlint)
        run: |
          curl -sSL -o "$RUNNER_TEMP/actionlint.tar.gz" \
            https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color

      # ESLint (inline JS in index.html) and markdownlint-cli2, pinned via the
      # committed package-lock.json so CI matches local installs.
      - name: Lint JS and Markdown
        run: npm run lint

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          echo "${{ secrets.DEPLOY_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          cat >> ~/.ssh/config <<'EOF'
          Host http2.core-networks.de
            IdentityFile ~/.ssh/id_deploy
            IdentitiesOnly yes
          EOF

      - name: Deploy
        run: ./deploy.sh ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
