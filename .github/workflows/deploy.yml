name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Preview changes without writing (rsync --dry-run)"
        type: boolean
        default: false

# Least privilege: neither job needs to write to the repo. validate only reads
# the checkout to lint and test; deploy authenticates to the host over SSH, not
# with the GITHUB_TOKEN. Setting contents: read drops every other default scope.
permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Nu Html Checker (current release) over the markup, the stylesheet and the
      # SVG favicon, mirroring `validate.sh`. We download the jar rather than use
      # a packaged wrapper: wrappers ship an older bundled vnu that rejects valid
      # modern features (theme-color `media`, the `color-scheme` CSS property).
      # Selecting files by extension keeps vnu away from the binary PNGs.
      - name: Validate HTML, CSS and SVG
        run: |
          curl -sSfL -o "$RUNNER_TEMP/vnu.jar" \
            https://github.com/validator/validator/releases/download/latest/vnu.jar
          # Filter two benign infos: the void-element trailing slash (Prettier
          # house style) and the CSP meta check, a file:// false positive where
          # script-src 'self' can't match the same-origin js/ modules (served
          # over https it allows them; verified in-browser, no violations).
          find . \( -path ./.git -o -path ./node_modules \) -prune -o \
            \( -name '*.html' -o -name '*.css' -o -name '*.svg' \) \
            -exec java -jar "$RUNNER_TEMP/vnu.jar" \
              --filterpattern '.*(Trailing slash on void elements|Content Security Policy).*' \
              --also-check-css --also-check-svg {} +

      # vnu only covers the SVG XML; sitemap.xml is otherwise unchecked. Plain
      # --noout is well-formedness only (no network). xmllint ships in
      # libxml2-utils, which isn't on the runner by default. Mirrors validate.sh.
      - name: Validate XML well-formedness
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-utils
          xmllint --noout sitemap.xml

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"
          cache: npm

      - name: Install npm tooling
        run: npm ci

      - name: Read tool versions
        id: versions
        run: |
          {
            echo "shfmt=$(awk '/^shfmt / {print $2}' .tool-versions)"
            echo "actionlint=$(awk '/^actionlint / {print $2}' .tool-versions)"
          } >> "$GITHUB_OUTPUT"

      # Pinned to the version run locally so CI and developers agree on style.
      - name: Check formatting (Prettier)
        run: npm run format:check

      # shellcheck is preinstalled on ubuntu-latest; shfmt we fetch as a pinned
      # static binary so CI matches what developers run locally.
      - name: Lint and format-check shell scripts
        run: |
          shellcheck deploy.sh validate.sh
          curl -sSfL -o "$RUNNER_TEMP/shfmt" \
            https://github.com/mvdan/sh/releases/download/v${{ steps.versions.outputs.shfmt }}/shfmt_v${{ steps.versions.outputs.shfmt }}_linux_amd64
          chmod +x "$RUNNER_TEMP/shfmt"
          "$RUNNER_TEMP/shfmt" -d deploy.sh validate.sh

      # actionlint validates the workflow itself and runs ShellCheck over the
      # embedded run scripts. Pinned static binary, no repo dependencies.
      - name: Lint workflows (actionlint)
        run: |
          curl -sSfL -o "$RUNNER_TEMP/actionlint.tar.gz" \
            https://github.com/rhysd/actionlint/releases/download/v${{ steps.versions.outputs.actionlint }}/actionlint_${{ steps.versions.outputs.actionlint }}_linux_amd64.tar.gz
          tar -xzf "$RUNNER_TEMP/actionlint.tar.gz" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color

      # ESLint (the browser modules in js/ and the inline JS in index.html, plus
      # JSON via @eslint/json), stylelint (css/) and markdownlint-cli2, all pinned
      # via package-lock.json.
      - name: Lint JS, JSON, CSS and Markdown
        run: npm run lint

      # Unit tests for the extracted pure logic (the theme cycle and the
      # terminal command replies), via Node's built-in runner — no extra deps.
      - name: Run unit tests
        run: npm test

      # Fail if the inline theme guard's sha256 isn't in the CSP (so the policy
      # can't drift), and if the og-image isn't the declared 1200x630.
      - name: Check CSP and og-image
        run: |
          npm run check:csp
          npm run check:og

      # svgo keeps the SVGs optimised; the check fails if either would change.
      - name: Check SVG optimisation
        run: |
          for f in assets/favicon.svg og-image.src.svg; do
            npx svgo --config svgo.config.mjs -i "$f" -o - | diff -q - "$f" \
              || { echo "$f is not optimised"; exit 1; }
          done

  deploy:
    needs: validate
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_KNOWN_HOSTS: ${{ secrets.DEPLOY_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

          printf '%s\n' "$DEPLOY_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Pin the dedicated key to the host and forbid any other identity, so
          # the agent/default keys can't interfere with auth.
          {
            echo "Host http2.core-networks.de"
            echo "  HostName http2.core-networks.de"
            echo "  User web4186"
            echo "  IdentityFile ~/.ssh/id_deploy"
            echo "  IdentitiesOnly yes"
            echo "  UserKnownHostsFile ~/.ssh/known_hosts"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      # deploy.sh shells out to `node` to stamp the deploy timestamp into
      # js/commands.js, so this job needs Node on the runner like validate does.
      # No npm cache: the script only uses node's stdlib, with no install step.
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".tool-versions"

      - name: Deploy
        run: ./deploy.sh ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
